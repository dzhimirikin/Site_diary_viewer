<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Diary</title>

    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <h1 id="project-title"></h1>

<div id="project-info"
     class="project-info">
</div>

<div id="selection-info"
     class="project-info">
    Selected: 0 photos
</div>


<div class="selection-buttons">

    <button id="select-all">
        Select All
    </button>

    <button id="clear-all">
        Clear
    </button>

    <button id="export-pdf">
        Export PDF
    </button>

    <button id="admin-btn">
        Admin
    </button>

</div>

    <div id="gallery"></div>

<div id="editor-modal">

<div id="editor-window">

    <div id="editor-header">

        <span>
            Comment editor
        </span>

        <button
            id="editor-close">
            ✕
        </button>

    </div>

    <textarea
        id="editor-text">
    </textarea>

    <div id="editor-buttons">

        <button
            id="editor-save">
            Save
        </button>

        <button
            id="editor-cancel">
            Cancel
        </button>

    </div>

</div>

</div>

</div>

    <!-- Viewer фотографий -->
    <div id="photo-viewer">

        <button id="viewer-prev">
            ◀
        </button>

        <img id="viewer-image">

        <button id="viewer-next">
            ▶
        </button>

        <button id="viewer-close">
            ✕
        </button>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module" src="firebase.js"></script>

    <script src="gallery.js"></script>

</body>
</html>
